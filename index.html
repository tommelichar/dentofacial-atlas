<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dentofacial CT Atlas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    overflow: hidden;
  }

  #viewer {
    position: relative;
    width: 100%;
    aspect-ratio: 544 / 418;
    background: #000;
    cursor: ns-resize;
    user-select: none;
  }

  #viewer canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  #controls {
    margin-top: 10px;
    width: 100%;
    padding: 0 4px;
  }

  #slider {
    width: 100%;
    accent-color: #4af;
  }
</style>
</head>
<body>

<div id="viewer">
  <canvas id="ct-canvas" width="544" height="418"></canvas>
</div>

<div id="controls">
  <input type="range" id="slider" min="0" max="29" value="0">
</div>

<script>
  const TOTAL_SLICES = 30;
  const canvas = document.getElementById('ct-canvas');
  const ctx = canvas.getContext('2d');
  const slider = document.getElementById('slider');
  const viewer = document.getElementById('viewer');

  const images = [];
  let currentSlice = 0;

  function sliceFilename(i) {
    return `slices/slice_${String(i).padStart(2, '0')}.png`;
  }

  function drawSlice(i) {
    if (images[i] && images[i].complete && images[i].naturalWidth > 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(images[i], 0, 0, canvas.width, canvas.height);
    }
    slider.value = i;
    currentSlice = i;
  }

  function setSlice(i) {
    drawSlice(Math.max(0, Math.min(TOTAL_SLICES - 1, i)));
  }

  for (let i = 0; i < TOTAL_SLICES; i++) {
    const img = new Image();
    img.src = sliceFilename(i);
    img.onload = () => { if (i === 0) drawSlice(0); };
    images.push(img);
  }

  slider.addEventListener('input', () => setSlice(parseInt(slider.value)));

  viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    setSlice(currentSlice + (e.deltaY > 0 ? 1 : -1));
  }, { passive: false });

  let dragStart = null;
  viewer.addEventListener('mousedown', (e) => { dragStart = e.clientY; });
  window.addEventListener('mousemove', (e) => {
    if (dragStart === null) return;
    const delta = e.clientY - dragStart;
    if (Math.abs(delta) > 12) {
      setSlice(currentSlice + (delta > 0 ? 1 : -1));
      dragStart = e.clientY;
    }
  });
  window.addEventListener('mouseup', () => { dragStart = null; });

  let touchStart = null;
  viewer.addEventListener('touchstart', (e) => { touchStart = e.touches[0].clientY; }, { passive: true });
  viewer.addEventListener('touchmove', (e) => {
    if (touchStart === null) return;
    const delta = e.touches[0].clientY - touchStart;
    if (Math.abs(delta) > 15) {
      setSlice(currentSlice + (delta > 0 ? 1 : -1));
      touchStart = e.touches[0].clientY;
    }
  }, { passive: true });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') setSlice(currentSlice + 1);
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') setSlice(currentSlice - 1);
  });
</script>
</body>
</html>
